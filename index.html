<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elements Wiki</title>

<style>

:root{
    --black:#0d0d0d;
    --dark-gray:#1b1b1b;
    --purple:#F757FF;
    --white:#ffffff;
    --light-gray: #5e5e5e;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:var(--black);
    color:var(--white);
    height:100vh;
    overflow:hidden;
}

/* =========================
   TOP BAR
========================= */

.topbar{
    height:120px;
    background:var(--dark-gray);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 40px;
    border-bottom:3px solid var(--purple);
}

.logo img{
    height:90px;
}

/* NAV BUTTONS */
.nav{
    display:flex;
    gap:20px;
}

.nav button{
    background:transparent;
    color:var(--light-gray);
    border:1px solid var(--light-gray);
    padding:10px 18px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

.nav button:hover{
    color:var(--purple);
    border-color:var(--purple);
    box-shadow:0 0 15px var(--purple);
}

.nav button.active{
    color:var(--purple);
    border-color:var(--purple);
    background:var(--dark-gray);
}

/* =========================
   LAYOUT
========================= */

.workspace{
    height:calc(100vh - 120px);
    padding:25px 25px 10px 25px;
    display: flex;
    flex-direction: column;
}

.page{
    display:none;
    height: 100%;
}

.page.active{
    display:flex;
    flex-direction: column;
    height: 100%;
}

/* =========================
   CARDS
========================= */

.card {
    background: var(--dark-gray);
    border: 1px solid var(--purple);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
}

.card-wiki-main {
    background: var(--dark-gray);
    border: 1px solid var(--purple);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    
    display: flex;
    flex-direction: column;
    height: 100%;        
    overflow: hidden;
}

.card-wiki-main h2 {
    margin-bottom: 15px;
    color: var(--white);
    flex-shrink: 0;
}

.card-inner-nav {
    flex-shrink: 0;
    background: var(--black);
    border: 1px solid var(--purple);
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 15px;
}

#wiki-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.card-inner-content {
    flex: 1;
    background: var(--black);
    border: 1px solid var(--purple);
    border-radius: 10px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

#wiki-content {
    flex: 1;
    overflow-y: auto;    
    overflow-x: hidden;
    padding-right: 8px;

    scrollbar-width: thin;
    scrollbar-color: var(--purple) var(--black);
}

.wiki-section,
.wiki-detail-container {
    display: block;
    overflow: visible !important;
    height: auto !important;
    width: 100%;
}

/* =========================
   INPUT SYSTEM (SELECT + INPUT)
========================= */

select,
input,
button.calc-action{
    background:transparent;
    color:var(--light-gray);
    border:1px solid var(--purple);
    padding:10px 18px;
    border-radius:10px;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    transition:0.2s;
    outline:none;
}

select:hover,
input:hover,
button.calc-action:hover{
    color:var(--purple);
    box-shadow:0 0 15px var(--purple);
}

select:focus,
input:focus{
    color:var(--purple);
    box-shadow:0 0 15px var(--purple);
}

/* =========================
   TAB BUTTONS (Wiki etc.)
========================= */

.btn-tab{
    background:transparent;
    color:var(--light-gray);
    border:1px solid var(--light-gray);
    padding:10px 18px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
    margin-right:10px;
    transition:0.2s;
}

.btn-tab:hover{
    color:var(--purple);
    border-color:var(--purple);
    box-shadow:0 0 15px var(--purple);
}

.btn-tab.active{
    color:var(--purple);
    border-color:var(--purple);
    background:var(--dark-gray);
}

/* =========================
   DISPLAY (Calculator)
========================= */

.display{
    width:100%;
    height:60px;
    background:#111;
    border:1px solid var(--purple);
    color:white;
    font-size:24px;
    padding:10px;
    margin-bottom:15px;
}

/* =========================
   BUTTON BASE (only for actions)
========================= */

button:active{
    transform:scale(0.98);
}

/* ==========================
    RESULT
========================== */

#result{
    margin-top:25px;
    opacity:1;
}

/* ===========================
    WIKI LIST
============================ */

.wiki-item{
    width:180px;
    text-align:left;
    margin-top:8px;
    padding:10px 12px;
    border:1px solid var(--purple);
    border-radius:10px;
    background:transparent;
    color:var(--white);
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
    text-transform:uppercase;
}

.wiki-item:hover{
    color:var(--purple);
    box-shadow:0 0 12px var(--purple);
    transform:translateX(4px);
}

.wiki-detail-container {
    display: flex;
    flex-wrap: wrap-reverse;
    gap: 20px;
    margin-top: 15px;
    font-family: sans-serif;
    color: var(--white);
    
    overflow: visible !important;
    height: auto !important;
    width: 100%;
}

.wiki-main-content {
    flex: 1;
    min-width: 300px;
    line-height: 1.6;
}

.wiki-infobox {
    width: 280px;
    background: var(--dark-gray);
    color: var(--white);
    border: 2px solid var(--purple);
    border-radius: 4px;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    flex-shrink: 0;
}

.wiki-infobox h3 {
    text-align: center;
    margin-top: 0;
    background: var(--black);
    color: var(--purple);
    padding: 8px;
    font-size: 1.1em;
    border-radius: 2px;
    border-bottom: 1px solid var(--light-gray);
}

.wiki-infobox img {
    display: block;
    width: 100%;
    height: auto;
    margin: 0 0 12px 0;
    border-radius: 2px;
    background: var(--black);
    border: 1px solid var(--light-gray);
    box-sizing: border-box;

    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

.wiki-stat-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 4px;
    border-bottom: 1px solid var(--light-gray);
    font-size: 0.9em;
}

.wiki-stat-row:last-child {
    border-bottom: none;
}

.wiki-stat-key {
    font-weight: bold;
    color: var(--purple);
}

.wiki-stat-value {
    color: var(--white);
}

.wiki-section {
    display: block;
    overflow: visible !important;
    height: auto !important;
    width: 100%;
}

.wiki-main-content h2 {
    text-decoration: underline;
    text-decoration-color: var(--white);
    margin-top: 0px;
    margin-bottom: 8px;
}

/* ===========================
    SCROLLBAR DESIGN (Webkit)
============================ */

#wiki-content::-webkit-scrollbar {
    width: 6px;
}

#wiki-content::-webkit-scrollbar-track {
    background: var(--black);
    border-radius: 4px;
}

#wiki-content::-webkit-scrollbar-thumb {
    background: var(--purple);
    border-radius: 4px;
}

#wiki-content::-webkit-scrollbar-thumb:hover {
    background: var(--white);
}

/* ===========================
    MISC WIKI STYLES
============================ */

.wiki-divider {
    border: none;
    border-top: 2px solid var(--purple);
    margin: 15px 0;
    box-shadow: 0 0 8px var(--purple);
}

.wiki-section .btn-tab {
    margin-bottom: 20px;
    display: inline-block;
}

/* ==========================
    XP BOOST CHECKBOX
========================== */
.boost-container {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 15px;
    margin-bottom: 5px;
}

.boost-container input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--purple); /* Färbt den Haken lila */
    cursor: pointer;
}

.boost-container label {
    color: var(--white);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    user-select: none;
}

.boost-container label:hover {
    color: var(--purple);
}

#mana-inputs-container input {
    width: auto;
    flex: none;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

    <div class="logo">
        <img src="images/logo.png" alt="Logo">
    </div>

    <div class="nav">
        <button class="active" onclick="showPage(this,'wiki')">Wiki</button>
        <button onclick="showPage(this,'rechner')">Rechner</button>
    </div>

</div>

<!-- WORKSPACE -->
<div class="workspace">

        <!-- WIKI -->
        <div id="wiki" class="page">

            <!-- ÄUẞERE WIKI MAIN CARD (Hält alles zusammen) -->
            <div class="card card-wiki-main">
                <h2>WIKI</h2>
        
            <!-- INNERE NAV-CARD (Fest oben) -->
            <div class="card-inner-nav">
                <div id="wiki-tabs"></div>
            </div>

            <!-- INNERE CONTENT-CARD (Scrollbar) -->
            <div class="card-inner-content">
                <div id="wiki-content"></div>
            </div>

        </div>

    </div>

    <!-- RECHNER -->
    <div id="rechner" class="page">

        <div class="card">
            <h2>Calculator</h2>
            <input id="display" class="display" type="text" placeholder="0">
        </div>

        <div class="card">
            <h2>Farm Calculator</h2>

            <br>

            <!-- Haupt-Auswahl (onchange korrigiert, damit sich Dropdowns UND Eingabefelder aktualisieren) -->
            <select id="typeSelect" onchange="updateMobList(); toggleInputFields();"></select>
            <select id="mobSelect"></select>

            <br><br>

            <!-- NEU: Modus-Auswahl für Mobs/Resources (Wird bei Arena automatisch ausgeblendet) -->
            <div id="calc-mode-container" style="margin-bottom: 15px;">
                <select id="calcMode" onchange="toggleInputFields()"></select>
            </div>

            <!-- DYNAMISCHES EINGABEFELD (Das JS steuert hier drin Platzhalter und Zeiteinheit) -->
            <div id="dynamic-inputs" style="display: inline-block; width: 100%;">
                <input id="amount" type="number" placeholder="Zeit">
                <select id="unit">
                    <option value="min">Minuten</option>
                    <option value="h">Stunden</option>
                </select>
            </div>

            <div id="mana-inputs-container" style="display: none; gap: 10px; margin-top: 15px; margin-bottom: 5px; width: 100%;">
                <input id="maxMana" type="number" placeholder="Max Mana">
                <input id="manaRegen" type="number" placeholder="Mana Regen / Sek">
            </div>

            <div id="trank-inputs-container" style="display: none; flex-direction: column; gap: 8px; margin-top: 10px; margin-bottom: 10px;">
                <div class="boost-container">
                    <input type="checkbox" id="useKleinTrank">
                    <label for="useKleinTrank">Kleine Mana-Tränke nutzen</label>
                </div>
                <div class="boost-container">
                    <input type="checkbox" id="useGrossTrank">
                    <label for="useGrossTrank">Große Mana-Tränke nutzen/label>
                </div>
            </div>

            <div class="boost-container">
                <input type="checkbox" id="xpBoost">
                <label for="xpBoost">Server Skill & Lvl Boost</label>
            </div>

            <div class="boost-container" id="frucht-container" style="display: none;"></div>

            <br>

            <button class="calc-action" onclick="calculateFarm()">Berechnen</button>

        <div id="result"></div>

    </div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
